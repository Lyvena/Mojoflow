[workspace]
name = "mojoflow"
version = "0.1.0"
description = "AI-Native Full-Stack Framework for Mojo"
license = "Apache-2.0"
authors = ["Lyvena"]
channels = ["https://conda.modular.com/max-nightly", "conda-forge"]
platforms = ["linux-64"]

[tasks]
test = "mojo run tests/run_all.mojo"
mojo-version = "mojo --version"

[dependencies]
mojo = ">=1.0.0b2.dev2026050406,<2"

[tool.mojoflow]
default-port = 8080
log-level = "info"
